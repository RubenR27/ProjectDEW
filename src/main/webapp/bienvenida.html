<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOL — Acceso al Sistema</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-marca">
            NOL <span>·</span> Notas Online
        </div>
        <div class="navbar-acciones">
            <span class="chip-rol">Portal Académico 2026</span>
        </div>
    </nav>

    <div class="contenedor-principal">
        
        <!-- PASO 1: Selección de Rol -->
        <div id="seleccion-rol" class="fade-in">
            <div style="text-align: center; margin-bottom: 50px;">
                <h1 class="seccion-titulo">Bienvenido al Portal</h1>
                <p class="seccion-subtitulo">Selecciona tu perfil para ingresar</p>
            </div>
            
            <div class="grid-roles">
                <!-- Tarjeta Alumno -->
                <div class="rol-card" onclick="mostrarLogin('alumno')">
                    <div class="rol-icon-container alumno-bg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                    </div>
                    <h3 class="asig-nombre">Estudiante</h3>
                    <p class="asig-meta">Acceso a notas y progreso</p>
                    <div class="rol-arrow">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </div>
                </div>
                
                <!-- Tarjeta Profesor -->
                <div class="rol-card" onclick="mostrarLogin('profesor')">
                    <div class="rol-icon-container profesor-bg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    </div>
                    <h3 class="asig-nombre">Docente</h3>
                    <p class="asig-meta">Gestión de actas y alumnos</p>
                    <div class="rol-arrow">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- PASO 2: Login -->
        <div id="seccion-login" style="display: none;" class="fade-in">
            <button class="btn-back" onclick="volverSeleccion()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                Regresar
            </button>
            
            <div class="login-box-aesthetic">
                <div id="login-header-icon" class="icon-header-small"></div>
                <h2 class="seccion-titulo" id="login-titulo" style="margin-bottom: 8px;">Acceso</h2>
                <p class="seccion-subtitulo" id="login-subtitulo" style="margin-bottom: 32px;"></p>

                <form method="POST" action="j_security_check">
                    <div class="form-group">
                        <label>Usuario</label>
                        <input type="text" name="j_username" class="form-input" placeholder="nombre@ejemplo.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" name="j_password" class="form-input" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn-primario">Ingresar al portal</button>
                </form>
            </div>
        </div>

    </div>

    <div class="pie-pagina">
        NOL — Sistema de Gestión Académica &copy; 2026
    </div>

    <script src="app.js"></script>
</body>
</html>
