<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NOL - Notas OnLine</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width:500px">
  <div class="card shadow">
    <div class="card-body p-4">
      <h2 class="card-title text-center mb-1">Notas OnLine</h2>
      <p class="text-center text-muted mb-4">Gestión de calificaciones</p>

      <form method="post" action="login">
        <div class="mb-3">
          <label class="form-label">DNI</label>
          <input type="text" name="j_username" class="form-control" 
                 placeholder="Ej: 12345678W" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" name="j_password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Entrar</button>
      </form>

      <hr>
      <p class="text-center text-muted small mt-3">
        Trabajo DEW 2025/2026 — Grupo GXX<br>
        Nombre1 Apellidos · Nombre2 Apellidos · ...
      </p>
    </div>
  </div>
</div>
</body>
</html>
